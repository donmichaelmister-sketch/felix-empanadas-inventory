{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Log Transfer</h2>
    
    <div id="alert" class="alert"></div>
    
    <form id="transferForm">
        <div class="form-group">
            <label for="from_location">From Location *</label>
            <select id="from_location" name="from_location" required>
                <option value="">-- Select --</option>
                <option value="Latta Storage">Latta Storage (Freezer)</option>
                <option value="Latta Display">Latta Display (Cases)</option>
                <option value="Optimist Hall">Optimist Hall</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="to_location">To Location *</label>
            <select id="to_location" name="to_location" required>
                <option value="">-- Select --</option>
                <option value="Latta Storage">Latta Storage (Freezer)</option>
                <option value="Latta Display">Latta Display (Cases)</option>
                <option value="Optimist Hall">Optimist Hall</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="bags">Bag Numbers (comma-separated) *</label>
            <textarea id="bags" name="bags" required placeholder="e.g., 1, 2, 3 or&#10;1&#10;2&#10;3" rows="4"></textarea>
            <p style="font-size: 12px; margin-top: 8px; color: #666;">
                Enter bag numbers separated by commas or on new lines
            </p>
        </div>
        
        <button type="submit">Log Transfer</button>
    </form>
</div>

<script>
document.getElementById('transferForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const alertDiv = document.getElementById('alert');
    const form = e.target;
    
    // Get values
    const from_loc = document.getElementById('from_location').value;
    const to_loc = document.getElementById('to_location').value;
    const bagsRaw = document.getElementById('bags').value;
    
    if (from_loc === to_loc) {
        alertDiv.className = 'alert error';
        alertDiv.textContent = '❌ From and To locations must be different';
        return;
    }
    
    // Parse bags
    const bags = bagsRaw
        .split(/[\n,]/)
        .map(b => b.trim())
        .filter(b => b)
        .join(',');
    
    const data = {
        from_location: from_loc,
        to_location: to_loc,
        bags: bags
    };
    
    try {
        const response = await fetch('/transfer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
            alertDiv.className = 'alert success';
            alertDiv.textContent = '✅ ' + result.message;
            form.reset();
        } else {
            alertDiv.className = 'alert error';
            alertDiv.textContent = '❌ ' + result.error;
        }
    } catch (error) {
        alertDiv.className = 'alert error';
        alertDiv.textContent = '❌ Error: ' + error.message;
    }
});
</script>
{% endblock %}
